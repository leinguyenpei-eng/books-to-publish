name: 📚 Auto Book Builder

on:
  schedule:
    - cron: '0 2 * * 1'   # Thứ Hai 9PM Houston — chạy tất cả sách
  workflow_dispatch:
    inputs:
      book_file:
        description: 'Tên file sách cụ thể (vd: 01-self-help-mindset) — để trống = chạy tất cả'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # Bước 1: tìm danh sách sách cần build
  list-books:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.book_file }}" ]; then
            # Chạy 1 sách cụ thể
            echo "matrix=[\"books/${{ github.event.inputs.book_file }}.yml\"]" >> $GITHUB_OUTPUT
          else
            # Chạy tất cả sách
            FILES=$(ls books/*.yml | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().split()))")
            echo "matrix=$FILES" >> $GITHUB_OUTPUT
          fi

  # Bước 2: build từng sách song song
  build-book:
    needs: list-books
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        book: ${{ fromJson(needs.list-books.outputs.matrix) }}
      fail-fast: false   # Sách này fail không ảnh hưởng sách kia

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install \
            google-generativeai \
            youtube-transcript-api \
            python-docx \
            requests \
            pyyaml \
            pillow

      - name: 📚 Build book — ${{ matrix.book }}
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GUMROAD_API_KEY:    ${{ secrets.GUMROAD_API_KEY }}
          PAYHIP_API_KEY:     ${{ secrets.PAYHIP_API_KEY }}
          BEACONS_API_KEY:    ${{ secrets.BEACONS_API_KEY }}
          FOURTHWALL_API_KEY: ${{ secrets.FOURTHWALL_API_KEY }}
          FB_PAGE_TOKEN:      ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:         ${{ secrets.FB_PAGE_ID }}
          MAILCHIMP_API_KEY:  ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_SERVER:   ${{ secrets.MAILCHIMP_SERVER }}
          MAILCHIMP_LIST_ID:  ${{ secrets.MAILCHIMP_LIST_ID }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL:         ${{ secrets.FROM_EMAIL }}
          FROM_NAME:          ${{ secrets.FROM_NAME }}
          BOOK_FILE:          ${{ matrix.book }}
        run: |
          python scripts/build_single.py

      - name: 📋 List outputs
        run: ls -la outputs/ || echo "No outputs"

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-${{ strategy.job-index }}-${{ github.run_number }}
          path: outputs/
          retention-days: 30
        continue-on-error: true

      - name: 🏷️ Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ strategy.job-index }}
          name: "📚 ${{ matrix.book }} — Build #${{ github.run_number }}"
          body: "Auto-generated book. Download files below ↓"
          files: |
            outputs/*.docx
            outputs/*.jpg
            outputs/*.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
