name: 📚 Auto Book Builder

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      book_file:
        description: 'Tên file sách (vd: 01-self-help-mindset) — để trống = chạy tất cả'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  list-books:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          rm -f books/example-book.yml
          if [ -n "${{ github.event.inputs.book_file }}" ]; then
            echo "matrix=[\"books/${{ github.event.inputs.book_file }}.yml\"]" >> $GITHUB_OUTPUT
          else
            FILES=$(ls books/*.yml 2>/dev/null | python3 -c "import sys,json; files=[f.strip() for f in sys.stdin if f.strip()]; print(json.dumps(files))")
            echo "matrix=$FILES" >> $GITHUB_OUTPUT
          fi

  build-book:
    needs: list-books
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        book: ${{ fromJson(needs.list-books.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install \
            google-generativeai \
            youtube-transcript-api \
            python-docx \
            requests \
            pyyaml \
            pillow \
            yt-dlp

      - name: 🔍 Debug — check files exist
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Repo structure ==="
          ls -la
          echo "=== books/ ==="
          ls -la books/
          echo "=== scripts/ ==="
          ls -la scripts/
          echo "=== Book file content ==="
          cat "${{ matrix.book }}"

      - name: 📚 Build — ${{ matrix.book }}
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GUMROAD_API_KEY:    ${{ secrets.GUMROAD_API_KEY }}
          PAYHIP_API_KEY:     ${{ secrets.PAYHIP_API_KEY }}
          BEACONS_API_KEY:    ${{ secrets.BEACONS_API_KEY }}
          FOURTHWALL_API_KEY: ${{ secrets.FOURTHWALL_API_KEY }}
          FB_PAGE_TOKEN:      ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:         ${{ secrets.FB_PAGE_ID }}
          MAILCHIMP_API_KEY:  ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_SERVER:   ${{ secrets.MAILCHIMP_SERVER }}
          MAILCHIMP_LIST_ID:  ${{ secrets.MAILCHIMP_LIST_ID }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL:         ${{ secrets.FROM_EMAIL }}
          FROM_NAME:          ${{ secrets.FROM_NAME }}
          BOOK_FILE:          ${{ matrix.book }}
        run: |
          # In ra để debug
          echo "BOOK_FILE=$BOOK_FILE"
          echo "GEMINI_API_KEY set: $( [ -n '${{ secrets.GEMINI_API_KEY }}' ] && echo YES || echo NO )"
          echo "ANTHROPIC_API_KEY set: $( [ -n '${{ secrets.ANTHROPIC_API_KEY }}' ] && echo YES || echo NO )"
          
          # Chạy với full error output
          PYTHONPATH=scripts python3 -u scripts/build_single.py 2>&1
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE"
          exit $EXIT_CODE

      - name: 📋 List outputs (always run)
        if: always()
        run: |
          echo "=== outputs/ ==="
          ls -lh outputs/ 2>/dev/null || echo "outputs/ folder empty or missing"
          echo "=== All files in repo ==="
          find . -name "*.docx" -o -name "*.jpg" -o -name "*.txt" 2>/dev/null | head -20

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: book-${{ strategy.job-index }}-run${{ github.run_number }}
          path: outputs/
          retention-days: 30
          if-no-files-found: warn

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          tag_name: build-${{ github.run_number }}-book${{ strategy.job-index }}
          name: "📚 Build #${{ github.run_number }} — Book ${{ strategy.job-index }}"
          body: "Auto-generated from ${{ matrix.book }}"
          files: outputs/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
