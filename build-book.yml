name: 📚 Auto Book Builder

on:
  schedule:
    - cron: '0 2 * * 1'   # Thứ Hai 9PM Houston time

  workflow_dispatch:       # Chạy thủ công từ Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install \
            google-generativeai \
            youtube-transcript-api \
            python-docx \
            requests \
            pyyaml \
            pillow

      - name: 📚 Build all books
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GUMROAD_API_KEY:    ${{ secrets.GUMROAD_API_KEY }}
          PAYHIP_API_KEY:     ${{ secrets.PAYHIP_API_KEY }}
          BEACONS_API_KEY:    ${{ secrets.BEACONS_API_KEY }}
          FOURTHWALL_API_KEY: ${{ secrets.FOURTHWALL_API_KEY }}
          FB_PAGE_TOKEN:      ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID:         ${{ secrets.FB_PAGE_ID }}
          MAILCHIMP_API_KEY:  ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_SERVER:   ${{ secrets.MAILCHIMP_SERVER }}
          MAILCHIMP_LIST_ID:  ${{ secrets.MAILCHIMP_LIST_ID }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL:         ${{ secrets.FROM_EMAIL }}
          FROM_NAME:          ${{ secrets.FROM_NAME }}
        run: |
          cd scripts
          python build_book.py

      - name: 📤 Upload all outputs
        uses: actions/upload-artifact@v4
        with:
          name: books-build-${{ github.run_number }}
          path: outputs/
          retention-days: 30

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "📚 Books — Build #${{ github.run_number }}"
          body: |
            Auto-generated books from YouTube pipeline.
            Download the files below ↓
          files: |
            outputs/*.docx
            outputs/*.jpg
            outputs/*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
